    <script>
    // declaraction of document.ready() function.
    (function () {
        var ie = !!(window.attachEvent && !window.opera);
        var wk = /webkit\/(\d+)/i.test(navigator.userAgent) && (RegExp.$1 < 525);
        var fn = [];
        var run = function () {
            for (var i = 0; i < fn.length; i++) fn[i]();
        };
        var d = document;
        d.ready = function (f) {
            if (!ie && !wk && d.addEventListener)
                return d.addEventListener('DOMContentLoaded', f, false);
            if (fn.push(f) > 1) return;
            if (ie)
                (function () {
                    try {
                        d.documentElement.doScroll('left');
                        run();
                    } catch (err) {
                        setTimeout(arguments.callee, 0);
                    }
                })();
            else if (wk)
                var t = setInterval(function () {
                    if (/^(loaded|complete)$/.test(d.readyState))
                        clearInterval(t), run();
                }, 0);
        };
    })();


    document.ready(
        function () {
            var _Blog = window._Blog || {};

            const getSystemTheme = () => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            };

            const configDefault = 'dark';
            const currentTheme = window.localStorage && window.localStorage.getItem('theme');
            const initialTheme = currentTheme || configDefault || getSystemTheme();
            const isDark = initialTheme === 'dark';

            const updateButtons = (dark) => {
                const sunBtn = document.getElementById("theme-toggle-sun");
                const moonBtn = document.getElementById("theme-toggle-moon");
                const mobileSunBtn = document.getElementById("mobile-theme-toggle-sun");
                const mobileMoonBtn = document.getElementById("mobile-theme-toggle-moon");

                if (dark) {
                    if (sunBtn) sunBtn.style.display = 'none';
                    if (moonBtn) moonBtn.style.display = 'inline-block';
                    if (mobileSunBtn) mobileSunBtn.style.display = 'none';
                    if (mobileMoonBtn) mobileMoonBtn.style.display = 'inline-block';
                } else {
                    if (sunBtn) sunBtn.style.display = 'inline-block';
                    if (moonBtn) moonBtn.style.display = 'none';
                    if (mobileSunBtn) mobileSunBtn.style.display = 'inline-block';
                    if (mobileMoonBtn) mobileMoonBtn.style.display = 'none';
                }
            };

            const updateThemeColor = (dark) => {
                const themeColor = dark ? '#292a2d' : '#ffffff';
                const metaTags = document.querySelectorAll('meta[name="theme-color"]');
                if (metaTags.length > 0) {
                    // 保留第一个，移除其他的，避免重复
                    for (let i = 1; i < metaTags.length; i++) {
                        metaTags[i].remove();
                    }
                    metaTags[0].setAttribute('content', themeColor);
                    metaTags[0].removeAttribute('media');
                } else {
                    const meta = document.createElement('meta');
                    meta.name = 'theme-color';
                    meta.content = themeColor;
                    document.head.appendChild(meta);
                }
            };

            const applyTheme = (dark) => {
                const body = document.getElementsByTagName('body')[0];
                if (dark) {
                    body.classList.add('dark-theme');
                } else {
                    body.classList.remove('dark-theme');
                }
                updateButtons(dark);
                updateThemeColor(dark);
            };

            // Initial application
            applyTheme(isDark);
            if (!currentTheme) {
                window.localStorage && window.localStorage.setItem('theme', initialTheme);
            }

            _Blog.toggleTheme = function () {
                const toggleFunc = (e) => {
                    // Prevent bubbling if needed, though buttons are distinct now
                    if (e) e.stopPropagation();

                    const body = document.getElementsByTagName('body')[0];
                    const isCurrentlyDark = body.classList.contains('dark-theme');

                    if (isCurrentlyDark) {
                        body.classList.remove('dark-theme');
                        updateButtons(false);
                        window.localStorage && window.localStorage.setItem('theme', 'light');
                    } else {
                        body.classList.add('dark-theme');
                        updateButtons(true);
                        window.localStorage && window.localStorage.setItem('theme', 'dark');
                    }
                };

                const sunBtn = document.getElementById("theme-toggle-sun");
                const moonBtn = document.getElementById("theme-toggle-moon");
                const mobileSunBtn = document.getElementById("mobile-theme-toggle-sun");
                const mobileMoonBtn = document.getElementById("mobile-theme-toggle-moon");

                if (sunBtn) sunBtn.addEventListener('click', toggleFunc);
                if (moonBtn) moonBtn.addEventListener('click', toggleFunc);
                if (mobileSunBtn) mobileSunBtn.addEventListener('click', toggleFunc);
                if (mobileMoonBtn) mobileMoonBtn.addEventListener('click', toggleFunc);
            };
            _Blog.toggleTheme();

            if (window.matchMedia && !configDefault) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                    const newTheme = e.matches ? 'dark' : 'light';
                    applyTheme(e.matches);
                    window.localStorage && window.localStorage.setItem('theme', newTheme);
                });
            }
        }
    );
</script>

<script>
    // Reading Progress Component
    document.addEventListener('DOMContentLoaded', () => {
        const progressValue = document.querySelector('.reading-value');
        const progressCircle = document.querySelector('.progress-ring__circle');
        const container = document.querySelector('.reading-progress-container');

        // Exit if elements don't exist (e.g., not on a post page)
        if (!progressValue || !progressCircle || !container) {
            return;
        }

        // SVG Circle setup
        const radius = progressCircle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;

        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        progressCircle.style.strokeDashoffset = circumference;

        function setProgress(percent) {
            const safePercent = Math.min(100, Math.max(0, percent));
            progressValue.textContent = `${Math.round(safePercent)}%`;
            const offset = circumference - (safePercent / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
        }

        function onScroll() {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

            if (scrollHeight <= 0) {
                setProgress(0);
                return;
            }

            const scrollPercent = (scrollTop / scrollHeight) * 100;
            setProgress(scrollPercent);

            // Show/Hide logic: Show if scrolled more than 100px
            if (scrollTop > 100) {
                container.classList.add('show');
            } else {
                container.classList.remove('show');
            }
        }

        // Initialize
        onScroll();

        // Listen for scroll events
        window.addEventListener('scroll', onScroll, { passive: true });

        // Recalculate on resize
        window.addEventListener('resize', onScroll);
    });
</script>

                        <script>
                            (function () {
                                var MEMO_PER_PAGE = 20;
                                var currentPage = 1;
                                var items = document.querySelectorAll('.memo-item');
                                var totalItems = items.length;
                                var totalPages = Math.ceil(totalItems / MEMO_PER_PAGE);

                                // 初始化内容折叠
                                items.forEach(function (item) {
                                    var body = item.querySelector('.memo-body');
                                    var content = item.querySelector('.memo-content');
                                    if (content && content.scrollHeight > 160) {
                                        body.classList.add('collapsed');
                                        var btn = document.createElement('button');
                                        btn.className = 'memo-expand-btn';
                                        btn.style.display = 'inline';
                                        btn.textContent = '展开全文 ▼';
                                        btn.onclick = function () {
                                            if (body.classList.contains('collapsed')) {
                                                body.style.maxHeight = content.scrollHeight + 'px';
                                                body.classList.remove('collapsed');
                                                btn.textContent = '收起 ▲';
                                            } else {
                                                body.style.maxHeight = '160px';
                                                body.classList.add('collapsed');
                                                btn.textContent = '展开全文 ▼';
                                            }
                                        };
                                        body.parentNode.insertBefore(btn, body.nextSibling);
                                    }
                                });

                                // ======= GitHub 风格热力图 =======
                                var heatmapData = {};
                                items.forEach(function (item) {
                                    var d = item.getAttribute('data-created');
                                    if (d) {
                                        var dateStr = d.substring(0, 10);
                                        heatmapData[dateStr] = (heatmapData[dateStr] || 0) + 1;
                                    }
                                });

                                var COLORS = ['#ebedf0', '#9be9a8', '#40c463', '#28df99', '#1a9f6b'];
                                var MONTHS = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                                var DAYS = ['日', '一', '二', '三', '四', '五', '六'];

                                var today = new Date();
                                today.setHours(0, 0, 0, 0);
                                // 找到 ~53 周前的周日作为起点（约一年）
                                var endDay = today.getDay(); // 0=Sun
                                var totalDays = 52 * 7 + endDay + 1;
                                var startDate = new Date(today);
                                startDate.setDate(startDate.getDate() - totalDays + 1);
                                // 对齐到周日
                                startDate.setDate(startDate.getDate() - startDate.getDay());

                                var totalWeeks = Math.ceil(totalDays / 7);

                                // 构建周列数据
                                var weeks = [];
                                for (var w = 0; w < totalWeeks; w++) {
                                    var week = [];
                                    for (var d = 0; d < 7; d++) {
                                        var cellDate = new Date(startDate);
                                        cellDate.setDate(cellDate.getDate() + w * 7 + d);
                                        var key = cellDate.getFullYear() + '-' + String(cellDate.getMonth() + 1).padStart(2, '0') + '-' + String(cellDate.getDate()).padStart(2, '0');
                                        var count = heatmapData[key] || 0;
                                        var level = count === 0 ? 0 : count === 1 ? 1 : count <= 3 ? 2 : count <= 5 ? 3 : 4;
                                        var future = cellDate > today;
                                        week.push({ date: cellDate, key: key, count: count, level: level, future: future, month: cellDate.getMonth(), dayOfMonth: cellDate.getDate() });
                                    }
                                    weeks.push(week);
                                }

                                // 计算月份标签：在月份的第一个出现的那一周标出
                                var monthLabels = []; // { weekIndex, label }
                                var lastMonth = -1;
                                for (var w = 0; w < weeks.length; w++) {
                                    // 使用该周的第一天（周日）的月份
                                    var firstDay = weeks[w][0];
                                    if (!firstDay.future && firstDay.month !== lastMonth) {
                                        monthLabels.push({ weekIndex: w, label: MONTHS[firstDay.month] });
                                        lastMonth = firstDay.month;
                                    }
                                }

                                // 构建 HTML 表格
                                // 添加 min-width 确保不被压缩，允许横向滚动
                                var html = '<table style="min-width: 600px;">';

                                // 月份行
                                html += '<tr><td class="heatmap-day-label"></td>';
                                var monthColIdx = 0;
                                for (var w = 0; w < totalWeeks; w++) {
                                    if (monthColIdx < monthLabels.length && monthLabels[monthColIdx].weekIndex === w) {
                                        // 计算 colspan: 直到下一个月标签或结尾
                                        var nextIdx = monthColIdx + 1 < monthLabels.length ? monthLabels[monthColIdx + 1].weekIndex : totalWeeks;
                                        var span = nextIdx - w;
                                        html += '<td colspan="' + span + '" class="heatmap-month-label">' + monthLabels[monthColIdx].label + '</td>';
                                        w += span - 1; // 跳过已合并的列
                                        monthColIdx++;
                                    } else {
                                        html += '<td class="heatmap-month-label"></td>';
                                    }
                                }
                                html += '</tr>';

                                // 7 行（周日到周六）
                                for (var d = 0; d < 7; d++) {
                                    html += '<tr>';
                                    html += '<td class="heatmap-day-label">' + DAYS[d] + '</td>';
                                    for (var w = 0; w < weeks.length; w++) {
                                        var c = weeks[w][d];
                                        if (c.future) {
                                            html += '<td></td>';
                                        } else {
                                            html += '<td class="cell" data-level="' + c.level + '" style="background:' + COLORS[c.level] + ';" title="' + c.key + ': ' + c.count + ' 条闪念"></td>';
                                        }
                                    }
                                    html += '</tr>';
                                }

                                html += '</table>';
                                var root = document.getElementById('heatmap-root');
                                root.innerHTML = html;
                                document.getElementById('heatmap-total').textContent = '过去一年共 ' + totalItems + ' 条闪念';

                                // 自动滚动到最右侧
                                setTimeout(function () {
                                    var wrap = document.querySelector('.heatmap-wrap');
                                    if (wrap) {
                                        wrap.scrollLeft = wrap.scrollWidth;
                                    }
                                }, 100);

                                // ======= 分页 =======
                                function updatePagination() {
                                    for (var i = 0; i < items.length; i++) {
                                        var start = (currentPage - 1) * MEMO_PER_PAGE;
                                        var end = currentPage * MEMO_PER_PAGE;
                                        if (i >= start && i < end) {
                                            items[i].classList.remove('memo-hide');
                                        } else {
                                            items[i].classList.add('memo-hide');
                                        }
                                    }
                                    var prevBtn = document.getElementById('memo-prev-btn');
                                    var nextBtn = document.getElementById('memo-next-btn');
                                    var pageInfo = document.getElementById('memo-page-info');

                                    prevBtn.className = currentPage <= 1 ? 'disabled' : '';
                                    nextBtn.className = currentPage >= totalPages ? 'disabled' : '';
                                    pageInfo.textContent = currentPage + ' / ' + totalPages;

                                    if (totalPages <= 1) {
                                        document.getElementById('memo-pagination').style.display = 'none';
                                    }
                                }

                                window.memoNextPage = function () {
                                    if (currentPage < totalPages) { currentPage++; updatePagination(); window.scrollTo(0, 0); }
                                };
                                window.memoPrevPage = function () {
                                    if (currentPage > 1) { currentPage--; updatePagination(); window.scrollTo(0, 0); }
                                };

                                updatePagination();
                            })();
                        </script>

                        

                </div>
